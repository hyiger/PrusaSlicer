name: Build macOS

on:
  push:
    branches: [master]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'set(SLIC3R_VERSION' version.inc | sed 's/.*"\(.*\)".*/\1/')
          BUILD_ID=$(grep 'set(SLIC3R_BUILD_ID' version.inc | sed 's/.*"\(.*\)".*/\1/' | sed "s/\${SLIC3R_VERSION}/$VERSION/")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build ID: $BUILD_ID"

      - name: Install system dependencies
        run: brew install automake cmake git gettext libtool texinfo m4 zlib

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: deps/build-default/destdir
          key: deps-macos-arm64-${{ hashFiles('deps/+*/**', 'deps/CMakeLists.txt', 'deps/CMakePresets.json') }}
          restore-keys: deps-macos-arm64-

      - name: Configure (builds deps if not cached)
        run: cmake --preset default -DPrusaSlicer_BUILD_DEPS=ON

      - name: Build
        run: cmake --build build-default -j$(sysctl -n hw.ncpu)

      - name: Create .app bundle
        run: |
          APP="PrusaSlicer.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          # Binary
          cp build-default/src/prusa-slicer "$APP/Contents/MacOS/PrusaSlicer"

          # Info.plist — find the CMake-generated one or substitute manually
          if [ -f build-default/src/platform/osx/Info.plist ]; then
            cp build-default/src/platform/osx/Info.plist "$APP/Contents/"
          elif [ -f build-default/Info.plist ]; then
            cp build-default/Info.plist "$APP/Contents/"
          else
            sed -e "s/@SLIC3R_APP_KEY@/PrusaSlicer/g" \
                -e "s/@SLIC3R_APP_NAME@/PrusaSlicer/g" \
                -e "s/@SLIC3R_BUILD_ID@/${{ steps.version.outputs.build_id }}/g" \
                -e "s/@SLIC3R_VERSION@/${{ steps.version.outputs.version }}/g" \
                src/platform/osx/Info.plist.in > "$APP/Contents/Info.plist"
          fi

          # Resources
          cp -R build-default/resources "$APP/Contents/Resources/" 2>/dev/null || \
          cp -R resources "$APP/Contents/Resources/"

          # Icons
          for icns in resources/icons/*.icns; do
            [ -f "$icns" ] && cp "$icns" "$APP/Contents/Resources/"
          done

          echo "Created $APP"
          ls -la "$APP/Contents/MacOS/"

      - name: Create DMG
        run: |
          DMG_NAME="${{ steps.version.outputs.build_id }}-macOS-arm64.dmg"
          hdiutil create -volname "PrusaSlicer" -srcfolder PrusaSlicer.app \
            -ov -format UDZO "$DMG_NAME"
          echo "dmg_name=$DMG_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: ${{ steps.version.outputs.build_id }}-macOS-arm64.dmg

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.build_id }}-macOS-arm64.dmg
