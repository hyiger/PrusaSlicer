name: Build macOS

on:
  push:
    branches: [master]
  release:
    types: [created]
  workflow_dispatch:

concurrency:
  group: build-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180
    env:
      SCCACHE_VERSION: v0.14.0
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 2G
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'set(SLIC3R_VERSION' version.inc | sed 's/.*"\(.*\)".*/\1/')
          BUILD_ID=$(grep 'set(SLIC3R_BUILD_ID' version.inc | sed 's/.*"\(.*\)".*/\1/' | sed "s/\${SLIC3R_VERSION}/$VERSION/")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build ID: $BUILD_ID"

      - name: Install system dependencies
        run: brew install automake cmake git gettext libtool texinfo m4 zlib

      - name: Get SDK version for cache key
        id: sdk
        run: echo "version=$(xcrun --show-sdk-version)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            deps/build-no-occt/destdir
            deps/build-no-occt/dep_*-prefix/src/*-stamp
          key: depsv4-macos-arm64-sdk${{ steps.sdk.outputs.version }}-${{ hashFiles('deps/+*/**', 'deps/CMakeLists.txt', 'deps/CMakePresets.json') }}
          restore-keys: depsv4-macos-arm64-sdk${{ steps.sdk.outputs.version }}-

      - name: Cache package downloads
        uses: actions/cache@v4
        with:
          path: deps/.pkg_cache
          key: pkgcache-macos-v1-${{ hashFiles('deps/+*/**', 'deps/CMakeLists.txt', 'deps/CMakePresets.json') }}
          restore-keys: pkgcache-macos-v1-

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-macos-arm64-v1-${{ github.run_id }}
          restore-keys: sccache-macos-arm64-v1-

      - name: Install sccache
        run: |
          SCCACHE_ARCHIVE="sccache-${SCCACHE_VERSION}-aarch64-apple-darwin.tar.gz"
          curl -L -o "$SCCACHE_ARCHIVE" \
            "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/${SCCACHE_ARCHIVE}"
          tar -xzf "$SCCACHE_ARCHIVE"
          echo "$PWD/${SCCACHE_ARCHIVE%.tar.gz}" >> "$GITHUB_PATH"

      - name: Sanitize cached zlib from deps destdir
        run: |
          # On macOS this project treats ZLIB as a system package, so any
          # cached zlib headers/libs under destdir are stale leftovers from an
          # older deps layout and can make libpng compile against mismatched
          # zlib versions.
          PREFIX="deps/build-no-occt/destdir/usr/local"
          rm -f \
            "$PREFIX/include/zlib.h" \
            "$PREFIX/include/zconf.h" \
            "$PREFIX/lib/libz.a" \
            "$PREFIX/lib/libz.dylib" \
            "$PREFIX/lib/libz.tbd" \
            "$PREFIX/lib"/libz.so* \
            "$PREFIX/lib/pkgconfig/zlib.pc"
          rm -rf "$PREFIX/lib/cmake/ZLIB"

      - name: Pre-download GMP (gmplib.org is unreliable)
        run: |
          mkdir -p deps/.pkg_cache/GMP
          if [ ! -f deps/.pkg_cache/GMP/gmp-6.2.1.tar.bz2 ]; then
            curl -L -o deps/.pkg_cache/GMP/gmp-6.2.1.tar.bz2 \
              https://ftp.gnu.org/gnu/gmp/gmp-6.2.1.tar.bz2 || \
            curl -L -o deps/.pkg_cache/GMP/gmp-6.2.1.tar.bz2 \
              https://mirror.ibcp.fr/pub/gnu/gmp/gmp-6.2.1.tar.bz2
          fi

      - name: Zero sccache stats
        run: sccache --zero-stats

      - name: Check if deps are cached
        id: deps-exist
        run: |
          if [ -d "deps/build-no-occt/destdir/usr/local/lib" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Deps destdir found, skipping deps build"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "Deps destdir not found, will build deps"
          fi

      - name: Build deps (skipped if cached)
        if: steps.deps-exist.outputs.found != 'true'
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: cmake --preset no-occt -DPrusaSlicer_BUILD_DEPS=ON -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Configure PrusaSlicer
        if: steps.deps-exist.outputs.found == 'true'
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: cmake --preset no-occt -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 -DCMAKE_POLICY_VERSION_MINIMUM=3.5 "-DCMAKE_PREFIX_PATH=${{ github.workspace }}/deps/build-no-occt/destdir/usr/local" -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build-no-occt -j$(sysctl -n hw.ncpu)

      - name: Create .app bundle
        run: |
          APP="PrusaSlicer.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          # Binary + G-code viewer symlink
          cp build-no-occt/src/prusa-slicer "$APP/Contents/MacOS/PrusaSlicer"
          ln -sf PrusaSlicer "$APP/Contents/MacOS/prusa-gcodeviewer"

          # Info.plist
          if [ -f build-no-occt/src/platform/osx/Info.plist ]; then
            cp build-no-occt/src/platform/osx/Info.plist "$APP/Contents/"
          else
            sed -e "s/@SLIC3R_APP_KEY@/PrusaSlicer/g" \
                -e "s/@SLIC3R_APP_NAME@/PrusaSlicer/g" \
                -e "s/@SLIC3R_BUILD_ID@/${{ steps.version.outputs.build_id }}/g" \
                -e "s/@SLIC3R_VERSION@/${{ steps.version.outputs.version }}/g" \
                src/platform/osx/Info.plist.in > "$APP/Contents/Info.plist"
          fi

          # Resources — the build creates a symlink, so follow it with -RL
          # to copy actual files, not the symlink itself
          if [ -d build-no-occt/resources ]; then
            cp -RL build-no-occt/resources/* "$APP/Contents/Resources/" 2>/dev/null || true
          fi
          # Also copy source resources that may not be in the build tree
          cp -Rn resources/* "$APP/Contents/Resources/" 2>/dev/null || true

          # Icons at top level of Resources for macOS
          for icns in resources/icons/*.icns; do
            [ -f "$icns" ] && cp "$icns" "$APP/Contents/Resources/"
          done

          echo "Created $APP"
          ls -la "$APP/Contents/MacOS/"
          echo "Resources size:"
          du -sh "$APP/Contents/Resources/"
          echo "Total .app size:"
          du -sh "$APP"

      - name: Sign and strip
        run: |
          strip -x PrusaSlicer.app/Contents/MacOS/PrusaSlicer 2>/dev/null || true
          codesign --force --deep --sign - PrusaSlicer.app

      - name: Free disk space
        run: |
          rm -rf build-no-occt
          rm -rf deps/build-no-occt/dep_*-prefix
          echo "App bundle size:"
          du -sh PrusaSlicer.app
          df -h .

      - name: Create DMG
        run: |
          DMG_NAME="${{ steps.version.outputs.build_id }}-macOS-arm64.dmg"
          hdiutil create -volname "PrusaSlicer" -srcfolder PrusaSlicer.app \
            -ov -format UDZO "$DMG_NAME"
          echo "dmg_name=$DMG_NAME" >> $GITHUB_ENV

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: ${{ steps.version.outputs.build_id }}-macOS-arm64.dmg

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.build_id }}-macOS-arm64.dmg
