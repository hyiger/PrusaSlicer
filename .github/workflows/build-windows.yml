name: Build Windows

on:
  push:
    branches: [master]
  release:
    types: [created]
  workflow_dispatch:

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 300
    env:
      SCCACHE_VERSION: v0.14.0
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 2G
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $versionLine = Select-String -Path version.inc -Pattern 'set\(SLIC3R_VERSION\s+"([^"]+)"' | ForEach-Object { $_.Matches[0].Groups[1].Value }
          $buildIdLine = Select-String -Path version.inc -Pattern 'set\(SLIC3R_BUILD_ID\s+"([^"]+)"' | ForEach-Object { $_.Matches[0].Groups[1].Value }
          $buildId = $buildIdLine -replace '\$\{SLIC3R_VERSION\}', $versionLine
          echo "version=$versionLine" >> $env:GITHUB_OUTPUT
          echo "build_id=$buildId" >> $env:GITHUB_OUTPUT
          Write-Host "Build ID: $buildId"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            deps/build-default/destdir
            deps/build-default/dep_*-prefix/src/*-stamp
          key: depsv2-windows-x64-${{ hashFiles('deps/+*/**', 'deps/CMakeLists.txt', 'deps/CMakePresets.json') }}
          restore-keys: depsv2-windows-x64-

      - name: Cache package downloads
        uses: actions/cache@v4
        with:
          path: deps/.pkg_cache
          key: pkgcache-windows-v1-${{ hashFiles('deps/+*/**', 'deps/CMakeLists.txt', 'deps/CMakePresets.json') }}
          restore-keys: pkgcache-windows-v1-

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-windows-x64-v1-${{ github.run_id }}
          restore-keys: sccache-windows-x64-v1-

      - name: Install sccache
        shell: pwsh
        run: |
          $base = "sccache-$env:SCCACHE_VERSION-x86_64-pc-windows-msvc"
          $zip = "$base.zip"
          Invoke-WebRequest -Uri "https://github.com/mozilla/sccache/releases/download/$env:SCCACHE_VERSION/$zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath .
          "$PWD\\$base" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Pre-download GMP (gmplib.org is unreliable)
        shell: bash
        run: |
          mkdir -p deps/.pkg_cache/GMP
          if [ ! -f deps/.pkg_cache/GMP/gmp-6.2.1.tar.bz2 ]; then
            curl -L -o deps/.pkg_cache/GMP/gmp-6.2.1.tar.bz2 \
              https://ftp.gnu.org/gnu/gmp/gmp-6.2.1.tar.bz2 || \
            curl -L -o deps/.pkg_cache/GMP/gmp-6.2.1.tar.bz2 \
              https://mirror.ibcp.fr/pub/gnu/gmp/gmp-6.2.1.tar.bz2
          fi

      - name: Zero sccache stats
        shell: pwsh
        run: sccache --zero-stats

      - name: Build deps (skipped if cached)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cmake --preset default -DPrusaSlicer_BUILD_DEPS=ON "-DCMAKE_POLICY_VERSION_MINIMUM=3.5" "-DCMAKE_C_COMPILER_LAUNCHER=sccache" "-DCMAKE_CXX_COMPILER_LAUNCHER=sccache"

      - name: Configure PrusaSlicer
        if: steps.cache-deps.outputs.cache-hit == 'true'
        run: |
          cmake --preset default "-DCMAKE_POLICY_VERSION_MINIMUM=3.5" "-DCMAKE_C_COMPILER_LAUNCHER=sccache" "-DCMAKE_CXX_COMPILER_LAUNCHER=sccache"

      - name: Build
        run: cmake --build build-default --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Install
        run: cmake --install build-default --config Release

      - name: Package
        shell: pwsh
        run: |
          $zipName = "${{ steps.version.outputs.build_id }}-win64.zip"
          Compress-Archive -Path build-default/dist/* -DestinationPath $zipName
          Write-Host "Created $zipName"

      - name: Show sccache stats
        if: always()
        shell: pwsh
        run: sccache --show-stats

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ${{ steps.version.outputs.build_id }}-win64.zip

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.build_id }}-win64.zip
