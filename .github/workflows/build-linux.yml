name: Build Linux

on:
  push:
    branches: [master]
  release:
    types: [created]
  workflow_dispatch:

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
            linuxdeploy_arch: x86_64
          - arch: arm64
            runner: ubuntu-22.04-arm
            linuxdeploy_arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    env:
      SCCACHE_VERSION: v0.14.0
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 2G
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'set(SLIC3R_VERSION' version.inc | sed 's/.*"\(.*\)".*/\1/')
          BUILD_ID=$(grep 'set(SLIC3R_BUILD_ID' version.inc | sed 's/.*"\(.*\)".*/\1/' | sed "s/\${SLIC3R_VERSION}/$VERSION/")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build ID: $BUILD_ID"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential autoconf cmake \
            libglu1-mesa-dev libgtk-3-dev libdbus-1-dev \
            libwebkit2gtk-4.1-dev texinfo \
            fuse libfuse2

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: deps/build-default/destdir
          key: deps-linux-${{ matrix.arch }}-${{ hashFiles('deps/+*/**', 'deps/CMakeLists.txt', 'deps/CMakePresets.json') }}
          restore-keys: deps-linux-${{ matrix.arch }}-

      - name: Cache package downloads
        uses: actions/cache@v4
        with:
          path: deps/.pkg_cache
          key: pkgcache-linux-${{ matrix.arch }}-v1-${{ hashFiles('deps/+*/**', 'deps/CMakeLists.txt', 'deps/CMakePresets.json') }}
          restore-keys: pkgcache-linux-${{ matrix.arch }}-v1-

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-linux-${{ matrix.arch }}-v1-${{ github.run_id }}
          restore-keys: sccache-linux-${{ matrix.arch }}-v1-

      - name: Install sccache
        run: |
          SCCACHE_ARCHIVE="sccache-${SCCACHE_VERSION}-${{ matrix.linuxdeploy_arch }}-unknown-linux-musl.tar.gz"
          curl -L -o "$SCCACHE_ARCHIVE" \
            "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/${SCCACHE_ARCHIVE}"
          tar -xzf "$SCCACHE_ARCHIVE"
          echo "$PWD/${SCCACHE_ARCHIVE%.tar.gz}" >> "$GITHUB_PATH"

      - name: Pre-download GMP (gmplib.org is unreliable)
        run: |
          mkdir -p deps/.pkg_cache/GMP
          if [ ! -f deps/.pkg_cache/GMP/gmp-6.2.1.tar.bz2 ]; then
            curl -L -o deps/.pkg_cache/GMP/gmp-6.2.1.tar.bz2 \
              https://ftp.gnu.org/gnu/gmp/gmp-6.2.1.tar.bz2 || \
            curl -L -o deps/.pkg_cache/GMP/gmp-6.2.1.tar.bz2 \
              https://mirror.ibcp.fr/pub/gnu/gmp/gmp-6.2.1.tar.bz2
          fi

      - name: Zero sccache stats
        run: sccache --zero-stats

      - name: Configure (builds deps if not cached)
        run: cmake --preset default -DPrusaSlicer_BUILD_DEPS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build-default -j$(nproc)

      - name: Install
        run: cmake --install build-default

      - name: Package AppImage
        run: |
          # Download linuxdeploy for the correct architecture
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.linuxdeploy_arch }}.AppImage"
          chmod +x linuxdeploy-${{ matrix.linuxdeploy_arch }}.AppImage

          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/PrusaSlicer
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/128x128/apps

          # Copy binary and resources
          cp build-default/dist/bin/prusa-slicer AppDir/usr/bin/
          [ -L build-default/dist/bin/prusa-gcodeviewer ] && \
            cp -P build-default/dist/bin/prusa-gcodeviewer AppDir/usr/bin/ || true
          cp -r build-default/dist/resources/* AppDir/usr/share/PrusaSlicer/ 2>/dev/null || \
            cp -r resources/* AppDir/usr/share/PrusaSlicer/

          # Desktop file and icon
          cp src/platform/unix/PrusaSlicer.desktop AppDir/usr/share/applications/
          if [ -f resources/icons/PrusaSlicer_128px.png ]; then
            cp resources/icons/PrusaSlicer_128px.png AppDir/usr/share/icons/hicolor/128x128/apps/PrusaSlicer.png
          fi

          # Build AppImage
          APPIMAGE_NAME="${{ steps.version.outputs.build_id }}-linux-${{ matrix.arch }}.AppImage"
          OUTPUT="$APPIMAGE_NAME" ./linuxdeploy-${{ matrix.linuxdeploy_arch }}.AppImage \
            --appdir AppDir \
            --desktop-file src/platform/unix/PrusaSlicer.desktop \
            --output appimage || echo "AppImage creation failed, tarball is still available"

          # Rename if output name differs
          if [ -f PrusaSlicer*.AppImage ] && [ ! -f "$APPIMAGE_NAME" ]; then
            mv PrusaSlicer*.AppImage "$APPIMAGE_NAME"
          fi

      - name: Package deb
        run: |
          DEB_NAME="${{ steps.version.outputs.build_id }}-linux-${{ matrix.arch }}.deb"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "${{ matrix.arch }}" = "x64" ]; then
            DEB_ARCH="amd64"
          else
            DEB_ARCH="arm64"
          fi

          # Create directory structure
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/PrusaSlicer
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/128x128/apps

          # Control file
          cat > deb/DEBIAN/control << CTRL
          Package: prusaslicer
          Version: ${VERSION}
          Architecture: ${DEB_ARCH}
          Maintainer: hyiger
          Description: PrusaSlicer - G-code generator for 3D printers (Filament Edition)
           Converts 3D models (STL, OBJ, AMF, 3MF, STEP) into G-code
           for FFF and SLA 3D printers. This fork adds built-in
           calibration tools for temperature, flow rate, pressure
           advance, retraction, and more.
          Section: graphics
          Priority: optional
          Depends: libgtk-3-0, libglu1-mesa, libdbus-1-3
          CTRL
          # Strip leading whitespace from control file (heredoc was indented)
          sed -i 's/^          //' deb/DEBIAN/control

          # Copy binary and resources
          cp build-default/dist/bin/prusa-slicer deb/usr/bin/
          [ -L build-default/dist/bin/prusa-gcodeviewer ] && \
            cp -P build-default/dist/bin/prusa-gcodeviewer deb/usr/bin/ || true
          cp -r build-default/dist/resources/* deb/usr/share/PrusaSlicer/ 2>/dev/null || \
            cp -r resources/* deb/usr/share/PrusaSlicer/

          # Desktop file and icon
          cp src/platform/unix/PrusaSlicer.desktop deb/usr/share/applications/
          cp resources/icons/PrusaSlicer_128px.png deb/usr/share/icons/hicolor/128x128/apps/PrusaSlicer.png

          # Build deb
          dpkg-deb --build deb "$DEB_NAME"
          echo "Created $DEB_NAME"

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-${{ matrix.arch }}-appimage
          path: ${{ steps.version.outputs.build_id }}-linux-${{ matrix.arch }}.AppImage
          if-no-files-found: ignore

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-deb
          path: ${{ steps.version.outputs.build_id }}-linux-${{ matrix.arch }}.deb

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.version.outputs.build_id }}-linux-${{ matrix.arch }}.AppImage
            ${{ steps.version.outputs.build_id }}-linux-${{ matrix.arch }}.deb
